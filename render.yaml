services:
  - type: web
    name: unityspiritpartners
    env: static
    buildCommand: echo "Static site — no build needed"
    staticPublishPath: .
    headers:
      - path: /frames-webp/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /frames-mobile/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
